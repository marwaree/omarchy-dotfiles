# Application bindings
bindd = SUPER, N, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, E, File manager, exec, uwsm-app -- nautilus --new-window
unbind = SUPER, W
bindd = SUPER, W, Browser, exec, omarchy-launch-browser
bindd = SUPER, Q, Close focused window, killactive
bindd = SUPER SHIFT ALT, B, Browser (private), exec, omarchy-launch-browser --private
bindd = SUPER SHIFT, M, Music, exec, omarchy-launch-or-focus spotify
bindd = SUPER SHIFT, N, Editor, exec, omarchy-launch-editor
bindd = SUPER, SUPER_L, Launch apps, exec, omarchy-launch-walker

bindd = SUPER, D, Maximize, fullscreen, 1

unbind = SUPER, L
bindd = SUPER, L, Lock screen, exec, omarchy-system-lock

unbind = SUPER, S
bindd = SUPER, S, Lock screen, exec, steam
# Add extra bindings
# bind = SUPER SHIFT, R, exec, alacritty -e ssh your-server

# Overwrite existing bindings, like putting Omarchy Menu on Super + Space
unbind = SUPER, SPACE
bindd = SUPER, BACKSPACE, Omarchy menu, exec, omarchy-menu

# Logitech MX Keys
# bind = SUPER SHIFT, S, exec, omarchy-capture-screenshot      # Print Screen Button
# bind = SUPER, H, exec, voxtype record toggle                 # Dictation Button
# bind = SUPER, PERIOD, exec, omarchy-launch-walker -m symbols # Emoji Button

# Unbind Omarchy workspace bindings
unbind = SUPER, code:10
unbind = SUPER, code:11
unbind = SUPER, code:12
unbind = SUPER, code:13
unbind = SUPER, code:14
unbind = SUPER, code:15
unbind = SUPER, code:16
unbind = SUPER, code:17
unbind = SUPER, code:18
unbind = SUPER, code:19
unbind = SUPER SHIFT, code:10
unbind = SUPER SHIFT, code:11
unbind = SUPER SHIFT, code:12
unbind = SUPER SHIFT, code:13
unbind = SUPER SHIFT, code:14
unbind = SUPER SHIFT, code:15
unbind = SUPER SHIFT, code:16
unbind = SUPER SHIFT, code:17
unbind = SUPER SHIFT, code:18
unbind = SUPER SHIFT, code:19

bind = SUPER, 1, split-workspace, 1
bind = SUPER, 2, split-workspace, 2
bind = SUPER, 3, split-workspace, 3
bind = SUPER, 4, split-workspace, 4
bind = SUPER, 5, split-workspace, 5
bind = SUPER, 6, split-workspace, 6
bind = SUPER, 7, split-workspace, 7
bind = SUPER, 8, split-workspace, 8
bind = SUPER, 9, split-workspace, 9
bind = SUPER, 0, split-workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = SUPER SHIFT, 1, split-movetoworkspace, 1
bind = SUPER SHIFT, 2, split-movetoworkspace, 2
bind = SUPER SHIFT, 3, split-movetoworkspace, 3
bind = SUPER SHIFT, 4, split-movetoworkspace, 4
bind = SUPER SHIFT, 5, split-movetoworkspace, 5
bind = SUPER SHIFT, 6, split-movetoworkspace, 6
bind = SUPER SHIFT, 7, split-movetoworkspace, 7
bind = SUPER SHIFT, 8, split-movetoworkspace, 8
bind = SUPER SHIFT, 9, split-movetoworkspace, 9
bind = SUPER SHIFT, 0, split-movetoworkspace, 10
